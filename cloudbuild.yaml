steps:
  # Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/crewmate:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/crewmate:latest'
      - '.'

  # Push to Artifact Registry / GCR
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '--all-tags'
      - 'gcr.io/$PROJECT_ID/crewmate'

  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'crewmate'
      - '--image=gcr.io/$PROJECT_ID/crewmate:$COMMIT_SHA'
      - '--region=us-central1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--port=8787'
      - '--memory=1Gi'
      - '--cpu=1'
      - '--min-instances=0'
      - '--max-instances=3'
      - '--set-env-vars=NODE_ENV=production'
      - '--set-secrets=GOOGLE_API_KEY=crewmate-gemini-key:latest,CREWMATE_ENCRYPTION_KEY=crewmate-enc-key:latest'

images:
  - 'gcr.io/$PROJECT_ID/crewmate:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/crewmate:latest'

options:
  logging: CLOUD_LOGGING_ONLY
